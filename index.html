<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlideGen | Cyber-Noir Edition</title>
    
    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

    <style>
        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --accent: #00f2ff;
            --text: #e0e0e0;
            --dim: #666;
            --border: #222;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Bento Grid Layout */
        .container {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            grid-template-rows: auto 1fr auto;
            gap: 20px;
            width: 90vw;
            max-width: 1200px;
            height: 85vh;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        /* Header Area */
        .header {
            grid-column: span 2;
            padding: 15px 24px;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
        }

        h1 { font-size: 1.2rem; letter-spacing: 3px; color: var(--accent); margin: 0; }

        /* Input Area */
        .input-box { grid-row: span 2; }

        textarea {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-family: 'Fira Code', monospace;
            font-size: 1rem;
            resize: none;
            outline: none;
            margin-top: 15px;
            line-height: 1.6;
        }

        /* Controls Area */
        .controls { gap: 15px; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; }

        label, button {
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
            font-size: 0.9rem;
            border: none;
        }

        #generateBtn {
            background: var(--accent);
            color: #000;
        }

        #generateBtn:hover { box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); }

        .file-upload {
            background: #222;
            color: var(--text);
            border: 1px dashed var(--dim);
        }

        /* Status & Labels */
        .label-text { font-size: 0.7rem; text-transform: uppercase; color: var(--dim); letter-spacing: 1px; }
        #status { font-size: 0.8rem; color: var(--accent); margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Section 1: Top Bar -->
        <div class="card header">
            <h1>SLIDE_GEN.EXE</h1>
            <div id="status">// SYSTEM_READY</div>
        </div>

        <!-- Section 2: Text Input -->
        <div class="card input-box">
            <span class="label-text">Source Content</span>
            <textarea id="textInput" placeholder="Paste your text here or upload a file..."></textarea>
        </div>

        <!-- Section 3: Tools -->
        <div class="card controls">
            <span class="label-text">Command Center</span>
            <div class="btn-group">
                <label class="file-upload">
                    UPLOAD .DOCX
                    <input type="file" id="filePicker" accept=".docx" style="display:none">
                </label>
                <button id="generateBtn">BUILD PRESENTATION</button>
            </div>
            <p style="color: var(--dim); font-size: 0.75rem; line-height: 1.4;">
                Separating paragraphs with a double line break creates a new slide.
            </p>
        </div>
    </div>

    <script>
        const textInput = document.getElementById('textInput');
        const generateBtn = document.getElementById('generateBtn');
        const filePicker = document.getElementById('filePicker');
        const status = document.getElementById('status');

        // 1. Handle Word Document Upload
        filePicker.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            status.innerText = "// READING_FILE...";
            const reader = new FileReader();
            
            reader.onload = (event) => {
                mammoth.convertToPlaintext({ arrayBuffer: event.target.result })
                    .then(result => {
                        textInput.value = result.value;
                        status.innerText = "// IMPORT_SUCCESSFUL";
                    })
                    .catch(err => {
                        status.innerText = "// ERROR_READING_DOCX";
                        console.error(err);
                    });
            };
            reader.readAsArrayBuffer(file);
        });

        // 2. Build and Download PowerPoint
        generateBtn.addEventListener('click', () => {
            const content = textInput.value.trim();
            if (!content) {
                status.innerText = "// ERROR: NO_CONTENT";
                return;
            }

            status.innerText = "// COMPILING_SLIDES...";
            
            const pres = new PptxGenJS();
            pres.layout = 'LAYOUT_16x9';

            // Logic: Split by double newline to simulate "AI Segments"
            const segments = content.split('\n\n').filter(s => s.trim() !== "");

            segments.forEach((chunk, index) => {
                const slide = pres.addSlide();
                slide.background = { fill: "0a0a0a" }; // Match app background

                // Slide Title
                slide.addText(`SEGMENT_${index + 1}`, {
                    x: 0.5, y: 0.5, w: '90%',
                    fontSize: 24, color: '00f2ff', 
                    bold: true, fontFace: 'Courier New'
                });

                // Slide Content
                slide.addText(chunk, {
                    x: 0.5, y: 1.5, w: '90%', h: '60%',
                    fontSize: 18, color: 'e0e0e0',
                    valign: 'top', fontFace: 'Arial'
                });
            });

            pres.writeFile({ fileName: `Project_Slides_${Date.now()}.pptx` })
                .then(() => {
                    status.innerText = "// EXPORT_COMPLETE";
                })
                .catch(() => {
                    status.innerText = "// EXPORT_FAILED";
                });
        });
    </script>
</body>
</html>
